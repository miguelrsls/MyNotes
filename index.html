<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MyNotes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: 'var(--color-primary-50)',
                            100: 'var(--color-primary-100)',
                            400: 'var(--color-primary-400)',
                            500: 'var(--color-primary-500)',
                            600: 'var(--color-primary-600)',
                            700: 'var(--color-primary-700)',
                        }
                    }
                }
            }
        }

        const colorPalettes = {
            red: { 50: '#fef2f2', 100: '#fee2e2', 400: '#f87171', 500: '#ef4444', 600: '#dc2626', 700: '#b91c1c' },
            blue: { 50: '#eff6ff', 100: '#dbeafe', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
            purple: { 50: '#faf5ff', 100: '#f3e8ff', 400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7e22ce' },
            yellow: { 50: '#fefce8', 100: '#fef9c3', 400: '#facc15', 500: '#eab308', 600: '#ca8a04', 700: '#a16207' },
            green: { 50: '#f0fdf4', 100: '#dcfce7', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' },
            turquoise: { 50: '#f0fdfa', 100: '#ccfbf1', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e' },
            gray: { 50: '#f4f4f5', 100: '#e4e4e7', 400: '#a1a1aa', 500: '#71717a', 600: '#27272a', 700: '#000000' },
            pink: { 50: '#fdf2f8', 100: '#fce7f3', 400: '#f472b6', 500: '#ec4899', 600: '#db2777', 700: '#be185d' }
        };

        // Forzar Tema Azul Oscuro en Index por defecto
        if (!localStorage.getItem('themeInitialized')) {
            localStorage.setItem('theme', 'dark');
            localStorage.setItem('accentColor', 'blue');
            localStorage.setItem('themeInitialized', 'true');
        }

        // Aplicar Modo Oscuro/Claro
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // Función para aplicar los colores al root CSS
        function applyColor(colorKey) {
            const palette = colorPalettes[colorKey] || colorPalettes.blue;
            document.documentElement.style.setProperty('--color-primary-50', palette[50]);
            document.documentElement.style.setProperty('--color-primary-100', palette[100]);
            document.documentElement.style.setProperty('--color-primary-400', palette[400]);
            document.documentElement.style.setProperty('--color-primary-500', palette[500]);
            document.documentElement.style.setProperty('--color-primary-600', palette[600]);
            document.documentElement.style.setProperty('--color-primary-700', palette[700]);
            localStorage.setItem('accentColor', colorKey);
        }

        // Aplicar el color guardado inmediatamente para evitar parpadeos
        applyColor(localStorage.getItem('accentColor') || 'blue');
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-black flex items-center justify-center min-h-screen transition-colors duration-300">

    <div class="fixed top-6 right-6 flex gap-3 z-50">
        <div class="relative group">
            <button onclick="toggleColorMenu()" class="p-2 rounded-full bg-white dark:bg-zinc-900 text-slate-600 dark:text-zinc-300 shadow-md border border-transparent dark:border-zinc-800 hover:shadow-lg transition">
                <i data-lucide="palette" class="w-5 h-5 text-primary-500"></i>
            </button>
            <div id="colorMenu" class="hidden absolute right-0 mt-2 p-3 bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-xl shadow-xl w-32 grid grid-cols-4 gap-2">
                <button onclick="changeColor('red')" class="w-5 h-5 rounded-full bg-red-500 hover:scale-125 transition"></button>
                <button onclick="changeColor('blue')" class="w-5 h-5 rounded-full bg-blue-500 hover:scale-125 transition"></button>
                <button onclick="changeColor('purple')" class="w-5 h-5 rounded-full bg-purple-500 hover:scale-125 transition"></button>
                <button onclick="changeColor('yellow')" class="w-5 h-5 rounded-full bg-yellow-500 hover:scale-125 transition"></button>
                <button onclick="changeColor('green')" class="w-5 h-5 rounded-full bg-green-500 hover:scale-125 transition"></button>
                <button onclick="changeColor('turquoise')" class="w-5 h-5 rounded-full bg-teal-500 hover:scale-125 transition"></button>
                <button onclick="changeColor('gray')" class="w-5 h-5 rounded-full bg-zinc-800 hover:scale-125 transition border border-slate-400"></button>
                <button onclick="changeColor('pink')" class="w-5 h-5 rounded-full bg-pink-500 hover:scale-125 transition"></button>
            </div>
        </div>
        
        <button onclick="toggleTheme()" class="p-2 rounded-full bg-white dark:bg-zinc-900 text-slate-600 dark:text-zinc-300 shadow-md border border-transparent dark:border-zinc-800 hover:shadow-lg transition">
            <i id="themeIcon" data-lucide="moon" class="w-5 h-5 text-primary-500"></i>
        </button>
    </div>

    <div class="bg-white dark:bg-black p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100 dark:border-zinc-800 m-4 transition-colors duration-300">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800 dark:text-white">MyNotes</h1>
            <p class="text-slate-500 dark:text-zinc-400 mt-2">Organiza tus ideas fácilmente.</p>
        </div>

        <div id="loginSection">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-zinc-300 mb-1">Correo electrónico</label>
                    <input type="email" id="loginEmail" placeholder="tu@ejemplo.com" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-zinc-300 mb-1">Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 outline-none transition">
                </div>

                <button type="submit"
                    class="w-full bg-primary-600 text-white font-semibold py-3 rounded-lg hover:bg-primary-700 transition duration-300 shadow-lg shadow-primary-100 dark:shadow-none">
                    Entrar
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-slate-600 dark:text-zinc-400">
                    ¿No tienes una cuenta?
                    <a href="#" id="showRegister" class="text-primary-600 dark:text-primary-400 font-semibold hover:underline">Regístrate gratis</a>
                </p>
            </div>
        </div>

        <div id="registerSection" class="hidden">
            <form id="registerForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-zinc-300 mb-1">Nombre</label>
                    <input type="text" id="registerNombre" placeholder="Tu nombre" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-zinc-300 mb-1">Teléfono</label>
                    <input type="tel" id="registerTelefono" placeholder="Tu teléfono" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-zinc-300 mb-1">Correo electrónico</label>
                    <input type="email" id="registerEmail" placeholder="tu@ejemplo.com" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-zinc-300 mb-1">Contraseña</label>
                    <input type="password" id="registerPassword" placeholder="••••••••" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 outline-none transition">
                </div>

                <button type="submit"
                    class="w-full bg-primary-600 text-white font-semibold py-3 rounded-lg hover:bg-primary-700 transition duration-300 shadow-lg shadow-primary-100 dark:shadow-none">
                    Registrarme
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-slate-600 dark:text-zinc-400">
                    ¿Ya tienes cuenta?
                    <a href="#" id="showLogin" class="text-primary-600 dark:text-primary-400 font-semibold hover:underline">Inicia sesión</a>
                </p>
            </div>
        </div>

        <p id="mensaje" class="text-center text-sm mt-4"></p>
    </div>

   <script>
    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        actualizarIconoTema(isDark);
    }

    function actualizarIconoTema(isDark) {
        const icon = document.getElementById('themeIcon');
        if(icon) {
            icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }
    }

    function toggleColorMenu() {
        document.getElementById('colorMenu').classList.toggle('hidden');
    }

    function changeColor(color) {
        applyColor(color);
        toggleColorMenu(); // Cierra el menú al seleccionar
    }

    const loginSection = document.getElementById('loginSection');
    const registerSection = document.getElementById('registerSection');
    const mensaje = document.getElementById('mensaje');

    document.getElementById('showRegister').addEventListener('click', (e) => {
        e.preventDefault();
        loginSection.classList.add('hidden');
        registerSection.classList.remove('hidden');
    });

    document.getElementById('showLogin').addEventListener('click', (e) => {
        e.preventDefault();
        registerSection.classList.add('hidden');
        loginSection.classList.remove('hidden');
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        const response = await fetch('http://localhost:3000/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ email, password })
        });

        if (response.ok) {
            window.location.href = '/dashboard'; 
        } else {
            mensaje.textContent = await response.text();
            mensaje.style.color = "#ef4444";
        }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nombre = document.getElementById('registerNombre').value;
        const telefono = document.getElementById('registerTelefono').value;
        const email = document.getElementById('registerEmail').value;
        const password = document.getElementById('registerPassword').value;

        const response = await fetch('http://localhost:3000/usuarios', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombre, telefono, email, password })
        });

        mensaje.textContent = await response.text();
        if(response.ok) {
            mensaje.style.color = "#10b981";
            setTimeout(() => document.getElementById('showLogin').click(), 2000);
        }
    });

    window.onload = () => {
        lucide.createIcons();
        const isDark = document.documentElement.classList.contains('dark');
        actualizarIconoTema(isDark);
    };
</script>
</body>
</html>
